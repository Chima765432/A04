<!DOCTYPE html>
<!-- tells the browser this is an HTML5 document -->
<html lang="en">
<!-- opening html tag, lang="en" sets the language to English -->

<head>
    <!-- head section holds metadata and the page title, nothing visible on the page itself -->
    <meta charset="UTF-8">
    <!-- sets character encoding so special characters display properly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- makes the page scale correctly on mobile devices -->
    <title>My First Web Page</title>
    <!-- the title that shows up on the browser tab -->
    <style>
        /* style tag lets me add CSS to control how the page looks */
        body {
            font-family: Arial, sans-serif;
            /* sets the font for the whole page */
            margin: 0;
            /* removes default spacing around the page */
            padding: 20px;
            /* adds some breathing room inside the page */
            min-height: 100vh;
            /* makes the body at least the full height of the screen */
            display: flex;
            /* uses flexbox to help push the footer to the bottom */
            flex-direction: column;
            /* stacks everything top to bottom */
        }

        main {
            flex: 1;
            /* makes the main content stretch so the footer stays at the bottom */
        }

        footer {
            background-color: #333;
            /* dark background for the footer */
            color: white;
            /* white text so it shows up on the dark background */
            text-align: center;
            /* centers the footer text */
            padding: 15px;
            /* adds space inside the footer */
            margin-top: 20px;
            /* adds space above the footer */
        }
    </style>
</head>

<body>
    <!-- body is where all the visible content goes -->
    <main>
        <!-- main wraps the core content of the page -->
        <h1>Chima765432</h1>
        <!-- h1 is the main heading, displaying my username -->
        <h2>Introduction to Website Development</h2>
        <!-- h2 is a subheading, showing the course name -->
        <p>Course Number: IS 117</p>
        <!-- paragraph element for the course number -->
        <p>Section: 002</p>
        <!-- paragraph element for the course section -->
    </main>

    <footer>
        <!-- footer section sits at the bottom of the page, visually separated from the main content -->
        <p>&copy; Chima, March 3, 2026</p>
        <!-- &copy; renders the copyright symbol, followed by my name and the assignment due date -->
    </footer>
</body>

</html>
<!-- closing html tag, end of the document -->
